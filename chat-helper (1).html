<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vigboss – مسوّق الردود</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 32px 24px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.4);
  }
  .header { text-align: center; margin-bottom: 28px; }
  .header .emoji { font-size: 48px; display: block; margin-bottom: 10px; }
  .header h1 { color: #fff; font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .header p { color: rgba(255,255,255,0.5); font-size: 14px; }
  .auto-badge {
    display: inline-block;
    background: rgba(34,197,94,0.2);
    border: 1px solid rgba(34,197,94,0.4);
    color: #4ade80;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    margin-top: 6px;
  }
  label { display: block; color: rgba(255,255,255,0.7); font-size: 14px; margin-bottom: 8px; font-weight: 500; }
  textarea {
    width: 100%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 14px;
    padding: 14px 16px;
    color: #fff;
    font-size: 15px;
    font-family: inherit;
    resize: none;
    outline: none;
    transition: border 0.2s;
    direction: rtl;
  }
  textarea::placeholder { color: rgba(255,255,255,0.3); }
  textarea:focus { border-color: rgba(139,92,246,0.6); }
  .btn {
    width: 100%;
    margin-top: 16px;
    padding: 14px;
    background: linear-gradient(135deg, #8b5cf6, #6366f1);
    border: none;
    border-radius: 14px;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    font-family: inherit;
  }
  .btn:hover { opacity: 0.9; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .result-box {
    margin-top: 20px;
    background: rgba(139,92,246,0.12);
    border: 1px solid rgba(139,92,246,0.3);
    border-radius: 14px;
    padding: 16px;
    display: none;
  }
  .result-label { color: #a78bfa; font-size: 12px; font-weight: 600; margin-bottom: 10px; }
  .result-text { color: #fff; font-size: 15px; line-height: 1.7; white-space: pre-wrap; word-break: break-word; }
  #macrodroid-reply { position: absolute; left: -9999px; font-size: 1px; color: transparent; }
  .copy-btn {
    margin-top: 12px;
    width: 100%;
    padding: 10px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    cursor: pointer;
    transition: background 0.2s;
    font-family: inherit;
  }
  .copy-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
  .loader { display: none; text-align: center; padding: 20px 0 4px; color: rgba(255,255,255,0.5); font-size: 14px; }
  .dots span {
    display: inline-block; width: 8px; height: 8px;
    background: #8b5cf6; border-radius: 50%; margin: 0 3px;
    animation: bounce 1.2s infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>

<!-- عنصر مخفي يقرأه MacroDroid -->
<div id="macrodroid-reply"></div>

<div class="container">
  <div class="header">
    <span class="emoji">👟</span>
    <h1>Vigboss – مسوّق الردود</h1>
    <p>اكتب رسالة الحريف وسنعطيك الرد المثالي باش تبيع 🔥</p>
    <span class="auto-badge">⚡ MacroDroid Ready</span>
  </div>

  <label>📩 رسالة الحريف</label>
  <textarea id="input" rows="4" placeholder="اكتب هنا ما قاله لك..."></textarea>

  <button class="btn" onclick="getReply()">⚡ احصل على الرد</button>

  <div class="loader" id="loader">
    <div class="dots"><span></span><span></span><span></span></div>
    <p style="margin-top:8px;">جاري توليد الرد...</p>
  </div>

  <div class="result-box" id="result-box">
    <div class="result-label">✅ ردّ عليه بهذا:</div>
    <div class="result-text" id="result-text"></div>
    <button class="copy-btn" onclick="copyText()">📋 نسخ الرد</button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `إنت تخدم كمسوّق آلي لصفحة تونسية اسمها Vigboss على فيسبوك.

✅ الجمهور: 90% باللهجة التونسية، 10% بالفرنسية.
✅ مهمتك: بيع حذاء new balance 530

المعطيات المتاحة فقط:
- منتوج: new balance 530
- مميزات: راحة فخمة، خفة لا تضاهى، تصميم يلفت الأنظار، سوميال أورثوبيديك مخيطة بجودة عالية.
- مناسبة للجميع: رجال / نساء / صغار / كبار.
- مقاسات: من 36 إلى 41.
- العرض: هدية مميزة مع كل طلب (لا تذكر نوع الهدية) + توصيل مجاني لأول 20 طلب.
- السعر: 69 دينار (شوا + هدية + توصيل).
- التوصيل من 24 إلى 48 ساعة.

⚠️ التعليمات الأساسية:
- ما تبداش برسالة ترحيب.
- احكي بلهجة تونسية إنسانية، مرحة وعفوية، ولينة جدا.
- ديما تخاطب الحريف مباشرة.
- الهدف الرئيسي: الحصول على رقم تليفون الحريف.
- وقت تاخو الرقم، قول: "سنتصل بيك لتأكيد الطلبية".
- إذا الحريف سأل على المقر: "نحنا شركة أونلاين نستورد منتجات ناجحة ونعرضوها".
- ما تخرجش على الموضوع.
- ما تذكرش جنس الحريف حتى تتأكد.
- إذا الحريف أرسل بالفرنسية، جاوب بالفرنسية.
- استخدم إيموجي رائعة.
- ⚠️ الرسالة يجب أن تكون أقل من جملة واحدة — قصيرة جدا جدا.
- لا تضع مقدمات — فقط الرد مباشرة.`;

async function getReply(autoMessage = null) {
  const inputEl = document.getElementById('input');
  const input = autoMessage !== null ? autoMessage : inputEl.value.trim();
  if (!input) return;

  const btn = document.querySelector('.btn');
  btn.disabled = true;
  document.getElementById('loader').style.display = 'block';
  document.getElementById('result-box').style.display = 'none';

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 300,
        system: SYSTEM_PROMPT,
        messages: [{ role: "user", content: `رسالة الحريف: "${input}"` }]
      })
    });

    const data = await response.json();
    const reply = data.content.map(i => i.text || '').join('');

    // عرض الرد في الواجهة
    document.getElementById('result-text').textContent = reply;
    document.getElementById('result-box').style.display = 'block';

    // ✅ MacroDroid يقرأ الرد من هنا
    document.getElementById('macrodroid-reply').textContent = reply;

    // ✅ MacroDroid يقرأ الرد من عنوان الصفحة أيضاً
    document.title = "REPLY:" + reply;

  } catch (e) {
    document.getElementById('macrodroid-reply').textContent = "ERROR";
    document.title = "REPLY:ERROR";
  } finally {
    document.getElementById('loader').style.display = 'none';
    btn.disabled = false;
  }
}

// ✅ MacroDroid يفتح الصفحة هكذا:
// https://yoursite.com/chat-helper.html?msg=بكم+الحذاء
window.addEventListener('load', () => {
  const params = new URLSearchParams(window.location.search);
  const msg = params.get('msg');
  if (msg) {
    document.getElementById('input').value = msg;
    getReply(msg);
  }
});

function copyText() {
  const text = document.getElementById('result-text').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✅ تم النسخ!';
    setTimeout(() => btn.textContent = '📋 نسخ الرد', 2000);
  });
}

document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.ctrlKey) getReply();
});
</script>
</body>
</html>
